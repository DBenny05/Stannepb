<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galerie - Église Sainte-Anne</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800">
  <!-- Header -->
  <header class="bg-white shadow py-6">
    <div class="container mx-auto px-6">
      <h1 class="text-3xl font-bold">Galerie Photos & Vidéos</h1>
      <p class="text-gray-600 mt-2">Revivez les temps forts de notre paroisse en images</p>
    </div>
  </header>

  <!-- Gallery Section -->
  <main class="container mx-auto px-6 py-12 space-y-16">
    <!-- Photos -->
    <section>
      <h2 class="text-2xl font-bold text-blue-600 mb-6">Photos</h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        <img src="https://source.unsplash.com/600x400/?church,celebration" alt="Photo 1" class="rounded-lg shadow-md">
        <img src="https://source.unsplash.com/600x400/?bible,people" alt="Photo 2" class="rounded-lg shadow-md">
        <img src="https://source.unsplash.com/600x400/?prayer,community" alt="Photo 3" class="rounded-lg shadow-md">
        <!-- Ajoute d'autres photos ici -->
      </div>
    </section>

    <!-- Vidéos -->
    <section>
      <h2 class="text-2xl font-bold text-blue-600 mb-6">Vidéos</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="aspect-w-16 aspect-h-9">
          <iframe class="w-full h-64 rounded-lg shadow-md" src="https://www.youtube.com/embed/VIDEO_ID1" title="Vidéo 1" frameborder="0" allowfullscreen></iframe>
        </div>
        <div class="aspect-w-16 aspect-h-9">
          <iframe class="w-full h-64 rounded-lg shadow-md" src="https://www.youtube.com/embed/VIDEO_ID2" title="Vidéo 2" frameborder="0" allowfullscreen></iframe>
        </div>
        <!-- Ajoute d'autres vidéos ici -->
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="bg-gray-800 text-white py-10">
    <div class="container mx-auto px-6 text-center">
      <p>&copy; 2025 Église Sainte-Anne de Port-Bouët. Tous droits réservés.</p>
    </div>
  </footer>
</body>
</html>
